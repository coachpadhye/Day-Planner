<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Day Plan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height:100%; }
  body {
    background: radial-gradient(circle at 20% 10%, #1a1f3d 0%, #0a0c1b 55%, #050611 100%);
    font-family: 'Space Grotesk', sans-serif;
    color: #eef0ff;
    padding: 32px 16px 100px;
    min-height: 100vh;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 10px; display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap;}
  .kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #7dd3fc;
    opacity: .8;
  }
  h1 {
    font-size: 34px;
    font-weight: 700;
    margin-top: 6px;
    background: linear-gradient(90deg, #f8fafc, #a5b4fc);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .startTimeBox {
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:#94a3b8;
    display:flex; flex-direction:column; gap:4px; align-items:flex-end;
  }
  .startTimeBox input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color:#eef0ff;
    border-radius:8px;
    padding:6px 8px;
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
  }
  .topBar {
    display:flex; justify-content:space-between; align-items:center;
    margin: 14px 0 18px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:#64748b;
  }
  .clearBtn {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.3);
    color:#f87171;
    border-radius: 100px;
    padding: 6px 14px;
    font-family:'JetBrains Mono',monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .clearBtn:active { transform: scale(.96); }

  .quickAddWrap { margin-bottom: 8px; }
  .quickAddLabel {
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color:#64748b;
    margin-bottom: 8px;
  }
  .quickAdd { display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 22px; }
  .qaBtn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    color:#cbd5e1;
    border-radius: 100px;
    padding: 6px 6px 6px 14px;
    font-family:'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    display:flex; align-items:center; gap:6px;
    transition: all .12s ease;
  }
  .qaLabel {
    background:none; border:none; color:inherit; font: inherit; cursor:pointer;
    display:flex; align-items:center; gap:6px; padding:2px 0;
  }
  .qaLabel:active { opacity: .7; }
  .qaBtn:active { transform: scale(.95); }
  .qaDot { width:8px; height:8px; border-radius:50%; }
  .qaX {
    background: rgba(255,255,255,0.08);
    border: none;
    color: #94a3b8;
    width: 16px; height: 16px;
    border-radius: 50%;
    font-size: 10px;
    line-height: 1;
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    margin-left: 2px;
    flex-shrink: 0;
  }
  .qaX:active { background: rgba(248,113,113,0.3); color:#f87171; }

  .addBtn {
    margin: 4px 0 26px;
    background: rgba(255,255,255,0.06);
    border: 1px dashed rgba(255,255,255,0.25);
    color:#cbd5e1;
    border-radius:14px;
    padding:12px 16px;
    width:100%;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    transition: all .15s ease;
  }
  .addBtn:active { transform: scale(.98); }

  .timeline { position: relative; padding-left: 36px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 12px; top: 6px; bottom: 6px;
    width: 2px;
    background: linear-gradient(180deg, #7dd3fc, #a78bfa, #f472b6, #34d399);
    opacity: .5;
  }
  .block {
    position: relative;
    margin-bottom: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 14px 16px;
    backdrop-filter: blur(6px);
    transition: transform .15s ease, border-color .15s ease, opacity .15s ease, box-shadow .2s ease;
  }
  .block.done { opacity: .45; }
  .block.done .title { text-decoration: line-through; }
  .block.now {
    border-color: #7dd3fc;
    box-shadow: 0 0 0 1px rgba(125,211,252,0.4), 0 0 20px rgba(125,211,252,0.15);
  }
  .block.dragging { opacity: .35; }
  .block.dragover { border-color:#7dd3fc; }
  .block::before {
    content: '';
    position: absolute;
    left: -30px; top: 22px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--dot, #7dd3fc);
    box-shadow: 0 0 12px var(--dot, #7dd3fc);
  }
  .nowTag {
    display:none;
    font-family:'JetBrains Mono',monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: #0a0c1b;
    background: #7dd3fc;
    padding: 2px 7px;
    border-radius: 100px;
    font-weight: 700;
    margin-left: 8px;
  }
  .block.now .nowTag { display:inline-block; }

  .rowTop { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .rowTopLeft { display:flex; align-items:center; flex-wrap:wrap; gap:2px; }
  .time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    letter-spacing: .5px;
    color: #94a3b8;
  }
  .rowActions { display:flex; align-items:center; gap:2px; }
  .checkBtn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: transparent;
    color: transparent;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    font-size: 13px;
    flex-shrink:0;
  }
  .block.done .checkBtn { background: #34d399; border-color:#34d399; color:#0a0c1b; }
  .titleRow { display:flex; align-items:center; gap:8px; margin-top:6px; }
  .title {
    font-size: 17px;
    font-weight: 700;
    background: transparent;
    border: none;
    color: #eef0ff;
    font-family: 'Space Grotesk', sans-serif;
    width: 100%;
    outline: none;
    border-bottom: 1px solid transparent;
  }
  .title:focus { border-bottom: 1px solid rgba(255,255,255,0.25); }
  .note {
    background: transparent;
    border: none;
    color: #cbd5e1;
    font-size: 13px;
    opacity: .85;
    width: 100%;
    margin-top: 4px;
    outline: none;
    font-family: 'Space Grotesk', sans-serif;
    resize: none;
  }
  .metaRow { display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 100px;
    color: #0a0c1b;
    font-weight: 700;
    background: var(--dot, #7dd3fc);
    border: none;
    width: auto;
    max-width: 140px;
  }
  .tag::placeholder { color: rgba(10,12,27,0.55); }
  .moveBtns { display:flex; flex-direction:column; gap:1px; }
  .moveBtn {
    background: none;
    border: none;
    color: #64748b;
    cursor: pointer;
    font-size: 11px;
    line-height: 1;
    padding: 3px 5px;
  }
  .moveBtn:active { color:#7dd3fc; }
  .moveBtn:disabled { opacity: .25; cursor: default; }
  .durBox {
    display:flex; align-items:center; gap:6px;
    font-family:'JetBrains Mono',monospace;
    font-size: 11px;
    color:#94a3b8;
  }
  .durBox input {
    width: 50px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color:#eef0ff;
    border-radius:6px;
    padding:3px 6px;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    text-align:center;
  }
  .iconBtn {
    background: none;
    border: none;
    color: #64748b;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 7px;
    border-radius:6px;
  }
  .iconBtn:active { color:#f87171; }
  .dragHandle {
    color:#475569; font-size:16px; letter-spacing:1px; user-select:none;
    padding: 4px 6px 4px 0;
    cursor: grab;
  }

  footer {
    margin-top: 30px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #64748b;
    letter-spacing: 1px;
  }
  .savedNote {
    text-align:center;
    font-family:'JetBrains Mono',monospace;
    font-size: 10px;
    color: #475569;
    margin-top:6px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="kicker">Mission Log · Today</div>
      <h1>Day Flight Plan</h1>
    </div>
    <div class="startTimeBox">
      <span>DAY START</span>
      <input type="time" id="startTime" value="10:00">
    </div>
  </header>

  <div class="topBar">
    <span id="dateLabel"></span>
    <button class="clearBtn" id="clearDay">Clear Day</button>
  </div>

  <div class="quickAddWrap">
    <div class="quickAddLabel">Quick Add</div>
    <div class="quickAdd" id="quickAdd"></div>
  </div>

  <div class="timeline" id="timeline"></div>

  <button class="addBtn" id="addBlock">+ Add Custom Block</button>

  <footer id="summary"></footer>
  <div class="savedNote" id="savedNote"></div>
</div>

<script>
const COLORS = ['#7dd3fc','#34d399','#f472b6','#a78bfa','#fbbf24','#f87171','#94a3b8','#38bdf8'];
const STORAGE_KEY = 'dayplan_blocks_v1';
const STORAGE_START_KEY = 'dayplan_start_v1';
const STORAGE_DATE_KEY = 'dayplan_date_v1';
const STORAGE_QUICKADD_KEY = 'dayplan_quickadd_v1';

const DEFAULT_QUICK_ADD = [
  { title: 'YMCA', dur: 60, tag: 'Health', color: '#7dd3fc' },
  { title: 'LinkedIn Post Block', dur: 90, tag: 'Content', color: '#a78bfa' },
  { title: 'LinkedIn Comment Block', dur: 60, tag: 'Content', color: '#f472b6' },
  { title: 'Cold Call Frameworks', dur: 90, tag: 'Sales Work', color: '#f87171' },
  { title: 'UGC Film Block', dur: 90, tag: 'UGC', color: '#a78bfa' },
  { title: 'Golf', dur: 240, tag: 'Golf', color: '#22c55e' },
  { title: 'Errands', dur: 90, tag: 'Errands', color: '#fbbf24' },
  { title: 'Playbook Organizing', dur: 60, tag: 'Deep Work', color: '#34d399' },
  { title: 'Calendar Update', dur: 30, tag: 'Admin', color: '#fbbf24' },
  { title: 'Break', dur: 20, tag: 'Break', color: '#94a3b8' },
];

function loadQuickAdd() {
  try {
    const raw = localStorage.getItem(STORAGE_QUICKADD_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return DEFAULT_QUICK_ADD.slice();
}

function saveQuickAdd() {
  try { localStorage.setItem(STORAGE_QUICKADD_KEY, JSON.stringify(quickAddItems)); } catch (e) {}
}

const todayStr = new Date().toDateString();

let blocks = loadBlocks();
let quickAddItems = loadQuickAdd();
let dragIndex = null;
let nowTicker = null;

function loadBlocks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return [];
}

function saveBlocks() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(blocks));
    const note = document.getElementById('savedNote');
    note.textContent = 'Saved ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch (e) {}
}

function loadStart() {
  try {
    const raw = localStorage.getItem(STORAGE_START_KEY);
    if (raw) return raw;
  } catch (e) {}
  return '10:00';
}

function saveStart() {
  try {
    localStorage.setItem(STORAGE_START_KEY, document.getElementById('startTime').value);
  } catch (e) {}
}

function fmtTime(mins) {
  let h = Math.floor(mins / 60) % 24;
  let m = ((mins % 60) + 60) % 60;
  const ampm = h >= 12 ? 'PM' : 'AM';
  let h12 = h % 12; if (h12 === 0) h12 = 12;
  return `${h12}:${m.toString().padStart(2,'0')} ${ampm}`;
}

function getStartMins() {
  const val = document.getElementById('startTime').value || '10:00';
  const [h, m] = val.split(':').map(Number);
  return h * 60 + m;
}

function nowMins() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

function renderQuickAdd() {
  const qa = document.getElementById('quickAdd');
  qa.innerHTML = '';
  quickAddItems.forEach((item, qi) => {
    const btn = document.createElement('div');
    btn.className = 'qaBtn';
    btn.innerHTML = `
      <button class="qaLabel" data-qa-index="${qi}"><span class="qaDot" style="background:${item.color}"></span>${item.title}</button>
      <button class="qaX" data-qa-remove="${qi}" title="Remove shortcut">✕</button>
    `;
    qa.appendChild(btn);
  });

  qa.querySelectorAll('[data-qa-index]').forEach(el => {
    el.onclick = () => {
      const item = quickAddItems[Number(el.dataset.qaIndex)];
      blocks.push({ ...item, note: '', done: false });
      saveBlocks();
      render();
    };
  });
  qa.querySelectorAll('[data-qa-remove]').forEach(el => {
    el.onclick = () => {
      quickAddItems.splice(Number(el.dataset.qaRemove), 1);
      saveQuickAdd();
      renderQuickAdd();
    };
  });
}

function render() {
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString([], { weekday:'long', month:'short', day:'numeric' });

  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';
  let cursor = getStartMins();
  const nm = nowMins();

  blocks.forEach((b, i) => {
    const start = cursor;
    const end = cursor + b.dur;
    const isNow = nm >= start && nm < end && !b.done;
    cursor = end;

    const el = document.createElement('div');
    el.className = 'block' + (b.done ? ' done' : '') + (isNow ? ' now' : '');
    el.style.setProperty('--dot', b.color);
    el.draggable = true;
    el.dataset.index = i;

    el.innerHTML = `
      <div class="rowTop">
        <div class="rowTopLeft">
          <div class="moveBtns">
            <button class="moveBtn" data-action="moveup" data-index="${i}" ${i===0?'disabled':''} title="Move up">▲</button>
            <button class="moveBtn" data-action="movedown" data-index="${i}" ${i===blocks.length-1?'disabled':''} title="Move down">▼</button>
          </div>
          <span class="time">${fmtTime(start)} – ${fmtTime(end)} · ${b.dur} min</span>
          <span class="nowTag">NOW</span>
        </div>
        <div class="rowActions">
          <button class="checkBtn" data-action="check" data-index="${i}">✓</button>
          <button class="iconBtn" data-action="quickadd" data-index="${i}" title="Save as quick-add shortcut">+</button>
          <button class="iconBtn" data-action="delete" data-index="${i}" title="Delete block">✕</button>
        </div>
      </div>
      <div class="titleRow">
        <input class="title" data-field="title" data-index="${i}" value="${(b.title||'').replace(/"/g,'&quot;')}">
      </div>
      <textarea class="note" data-field="note" data-index="${i}" rows="1" placeholder="Add a note...">${b.note||''}</textarea>
      <div class="metaRow">
        <input class="tag" data-field="tag" data-index="${i}" value="${(b.tag||'').replace(/"/g,'&quot;')}" placeholder="Category" style="--dot:${b.color}">
        <div class="durBox">
          <span>DUR</span>
          <input type="number" min="5" step="5" data-field="dur" data-index="${i}" value="${b.dur}">
          <span>min</span>
        </div>
      </div>
    `;
    timeline.appendChild(el);
  });

  const totalMin = blocks.reduce((s,b) => s + b.dur, 0);
  const h = Math.floor(totalMin/60), m = totalMin%60;
  document.getElementById('summary').textContent = blocks.length
    ? `${blocks.length} BLOCKS · ${h}H ${m}M SCHEDULED · ENDS ${fmtTime(cursor)}`
    : 'NO BLOCKS YET — USE QUICK ADD OR + ADD CUSTOM BLOCK';

  attachHandlers();
}

function attachHandlers() {
  document.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.onclick = () => {
      blocks.splice(Number(btn.dataset.index), 1);
      saveBlocks();
      render();
    };
  });
  document.querySelectorAll('[data-action="quickadd"]').forEach(btn => {
    btn.onclick = () => {
      const b = blocks[Number(btn.dataset.index)];
      const exists = quickAddItems.some(q => q.title === b.title && q.dur === b.dur && q.tag === b.tag);
      if (!exists) {
        quickAddItems.push({ title: b.title, dur: b.dur, tag: b.tag, color: b.color });
        saveQuickAdd();
        renderQuickAdd();
      }
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = '+'; }, 900);
    };
  });
  document.querySelectorAll('[data-action="check"]').forEach(btn => {
    btn.onclick = () => {
      const b = blocks[Number(btn.dataset.index)];
      b.done = !b.done;
      saveBlocks();
      render();
    };
  });
  document.querySelectorAll('[data-field="title"]').forEach(input => {
    input.oninput = () => { blocks[Number(input.dataset.index)].title = input.value; saveBlocks(); };
  });
  document.querySelectorAll('[data-field="note"]').forEach(ta => {
    ta.oninput = () => { blocks[Number(ta.dataset.index)].note = ta.value; saveBlocks(); };
  });
  document.querySelectorAll('[data-field="tag"]').forEach(input => {
    input.oninput = () => { blocks[Number(input.dataset.index)].tag = input.value; saveBlocks(); };
  });
  document.querySelectorAll('[data-action="moveup"]').forEach(btn => {
    btn.onclick = () => {
      const i = Number(btn.dataset.index);
      if (i === 0) return;
      [blocks[i-1], blocks[i]] = [blocks[i], blocks[i-1]];
      saveBlocks();
      render();
    };
  });
  document.querySelectorAll('[data-action="movedown"]').forEach(btn => {
    btn.onclick = () => {
      const i = Number(btn.dataset.index);
      if (i === blocks.length - 1) return;
      [blocks[i+1], blocks[i]] = [blocks[i], blocks[i+1]];
      saveBlocks();
      render();
    };
  });
  document.querySelectorAll('[data-field="dur"]').forEach(input => {
    input.onchange = () => {
      let v = parseInt(input.value, 10);
      if (isNaN(v) || v < 5) v = 5;
      blocks[Number(input.dataset.index)].dur = v;
      saveBlocks();
      render();
    };
  });

  document.querySelectorAll('.block').forEach(el => {
    el.addEventListener('dragstart', () => {
      dragIndex = Number(el.dataset.index);
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    el.addEventListener('dragover', (e) => {
      e.preventDefault();
      el.classList.add('dragover');
    });
    el.addEventListener('dragleave', () => el.classList.remove('dragover'));
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      el.classList.remove('dragover');
      const dropIndex = Number(el.dataset.index);
      if (dragIndex === null || dragIndex === dropIndex) return;
      const [moved] = blocks.splice(dragIndex, 1);
      blocks.splice(dropIndex, 0, moved);
      dragIndex = null;
      saveBlocks();
      render();
    });
  });
}

document.getElementById('startTime').addEventListener('change', () => { saveStart(); render(); });
document.getElementById('addBlock').addEventListener('click', () => {
  blocks.push({ title: 'New Block', dur: 30, tag: 'Custom', note: '', color: COLORS[blocks.length % COLORS.length], done: false });
  saveBlocks();
  render();
});
document.getElementById('clearDay').addEventListener('click', () => {
  if (confirm('Clear all blocks for today?')) {
    blocks = [];
    saveBlocks();
    render();
  }
});

document.getElementById('startTime').value = loadStart();
renderQuickAdd();
render();

// Live "now" highlight — refresh every 30s
nowTicker = setInterval(render, 30000);
</script>
</body>
</html>
